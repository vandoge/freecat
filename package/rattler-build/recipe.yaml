context:
  version: "1.1.0dev"

package:
  name: freecad
  version: "${{ version }}"

source:
  path: ../..
  use_gitignore: true

build:
  number: 0

requirements:
  build:
    - ccache
    - cmake
    - compilers>=1.10,<1.11
    - doxygen
    - ninja
    - noqt5
    - python>=3.11,<3.12
    - qt6-main>=6.8,<6.9
    - swig
    - clang
    - clangxx
    - kernel-headers_linux-64
    - libdrm-cos7-x86_64
    - libselinux-cos7-x86_64
    - libsepol-cos7-x86_64
    - libspnav
    - libx11-common-cos7-x86_64
    - libx11-cos7-x86_64
    - libxau-cos7-x86_64
    - libxcb-cos7-x86_64
    - libxdamage-cos7-x86_64
    - libxext-cos7-x86_64
    - libxfixes-cos7-x86_64
    - libxi-cos7-x86_64
    - libxi-devel-cos7-x86_64
    - libxxf86vm-cos7-x86_64
    - mesa-dri-drivers-cos7-x86_64
    - mesa-libegl-cos7-x86_64
    - mesa-libegl-devel-cos7-x86_64
    - mesa-libgl-cos7-x86_64
    - mesa-libgl-devel-cos7-x86_64
    - mold
    - pixman-cos7-x86_64
    - sed
    - sysroot_linux-64
    - xcb-util-cursor==0.1.5  ## hack to address https://github.com/FreeCAD/FreeCAD/issues/26726
    - xorg-x11-server-common-cos7-x86_64
    - xorg-x11-server-xvfb-cos7-x86_64
    - xorg-xproto

  host:
    - coin3d
    - eigen
    - fmt
    - freetype
    - hdf5
    - lark
    - libboost-devel
    - matplotlib-base
    - noqt5
    - numpy>=1.26,<2
    - occt==7.9.3
    - pcl
    - pivy
    - ply
    - pybind11
    - pyside6
    - python>=3.11,<3.12
    - qt6-main>=6.10.1,<6.11
    - six
    - vtk
    - xerces-c
    - yaml-cpp
    - zlib
    - sed
    - libspnav
    - xorg-xproto

  run:
    - blas * openblas*
    - blinker
    - calculix
    - debugpy
    - defusedxml
    - docutils
    - gmsh
    - graphviz
    - ifcopenshell
    - lark
    - lxml
    - matplotlib-base
    - nine
    - noqt5
    - numpy>=1.26,<2
    - occt==7.9.3
    - olefile
    - opencamlib
    - opencv
    - pandas
    - pip
    - pivy
    - ply
    - pycollada
    - pyside6
    - python>=3.11,<3.12
    - pythonocc-core
    - pyyaml
    - qt6-main>=6.10.1,<6.11
    - requests
    - scipy
    - sympy
    - typing_extensions
    - vtk
    - xlutils
    - libspnav
    - qt6-wayland
    - xcb-util-cursor==0.1.5  ## hack to address https://github.com/FreeCAD/FreeCAD/issues/26726
