# Workflow for building and uploading Linux x64 AppImage to releases

name: Build and Upload AppImage

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag name (e.g., weekly-2026.02.04)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-appimage:
    runs-on: ubuntu-24.04
    if: (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'weekly-')) || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@df199fb7be9f65074067a9eb93f12bb4c5547cf2 # v2.13.3
        with:
          egress-policy: audit

      - name: Checkout source code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || inputs.tag_name }}

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
        with:
          pixi-version: v0.40.3
          cache: true
          manifest-path: package/rattler-build/pixi.toml

      - name: Update pixi lock file if out of sync
        working-directory: package/rattler-build
        run: |
          # Try to install with locked flag first, if it fails, regenerate the lock file
          pixi install --locked || pixi install
        continue-on-error: false

      - name: Build FreeCAD package
        working-directory: package/rattler-build
        run: |
          pixi run -e default --manifest-path pixi.toml pixi-build build --no-build-id

      - name: Create AppImage bundle
        working-directory: package/rattler-build
        env:
          BUILD_TAG: ${{ github.event.release.tag_name || inputs.tag_name }}
          UPLOAD_RELEASE: "true"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pixi run -e package --manifest-path pixi.toml create_bundle
